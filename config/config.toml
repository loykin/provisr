# provisr sample configuration (TOML)
# You can run:  provisr -config config/config.toml
# This file demonstrates all supported fields.

# Global environment for all processes
env = ["GLOBAL_NAME=provisr", "SHARED_PORT=9000", "CHAIN=${GLOBAL_NAME}-x"]
# Optionally load additional env from files and/or include OS environment
# env_files = ["/path/to/.env"]
# use_os_env = true

# Default directory for process PID files (when spec.pid_file is not set)
# Relative paths are resolved relative to this config file location
pid_dir = "./run"

# Optional global log defaults
[log]
dir = "./provisr-logs"
max_size_mb = 10
max_backups = 3
max_age_days = 7
compress = false

# Process definitions are now in config/programs/*.toml files
# This allows for better organization and management of individual processes
# Each process can have its own configuration file in config/programs/

# Groups section: define logical groups referencing processes by name
[[groups]]
name = "backend"
members = ["api-server", "long-sleeper"]

# Persistent store has been removed. State is managed in-memory with PID-file based recovery.

# Optional daemon process configuration
[daemon]
pid_file = "./provisr.pid"
log_file = "./provisr.log"

# Optional HTTP API server configuration
# When enabled, `provisr serve --config config/config.toml` will start an HTTP server.
# You can override these with CLI flags: --api-listen and --api-base.
# Optional lifecycle history. The entire feature is disabled when this table
# is omitted or enabled=false. Events are written to every enabled store;
# primary selects the store used by the history read API.
[history]
# Master switch for all history stores.
enabled = true
primary = "sqlite"

[history.stores.sqlite]
enabled = true
dsn = "provisr-history.db"
# Run pending schema migrations when the store opens.
# Disable when migrations are managed separately by deployment tooling or a DBA.
migrate = true
# Delete history older than this duration. Omit or set to 0 to retain
# indefinitely. Cleanup runs once at startup and then at cleanup_interval.
retention = "720h"
cleanup_interval = "1h"

# [history.stores.postgres]
# enabled = true
# dsn = "postgres://user:password@localhost/provisr?sslmode=disable"
# migrate = true
# retention = "720h"
# cleanup_interval = "1h"

# [history.stores.clickhouse]
# enabled = true
# dsn = "clickhouse://default:@localhost:9000/default"
# table = "process_history"
# migrate = true
# retention = "720h"
# cleanup_interval = "1h"

# [history.stores.opensearch]
# enabled = true
# url = "http://localhost:9200"
# index = "provisr-history"
# migrate = true
# retention = "720h"
# cleanup_interval = "1h"

[server]
# There is no [server] "enabled" key — internal/config.ServerConfig has no
# such field. Whether the server starts is decided purely by whether this
# [server] table is present at all (cfg.Server != nil); `provisr serve`
# refuses to start if it's absent entirely (no [server] section anywhere in
# the config file).
# Listen address, e.g. ":8080" or "127.0.0.1:8080"
listen = ":8080"
# Base path for endpoints: {base}/start, {base}/stop, {base}/status
base_path = "/api"
# TLS configuration for HTTPS server (optional)
# When enabled, the server will use HTTPS instead of HTTP
[server.tls]
# Enable TLS (set to true to use HTTPS)
enabled = false
# TLS version constraints
min_version = "1.2"
max_version = "1.3"
# Option 1: Use specific certificate files
# cert_file = "/path/to/server.crt"
# key_file = "/path/to/server.key"
# Option 2: Use directory with standard filenames (tls.crt, tls.key)
# dir = "./tls"
# Option 3: Auto-generate self-signed certificates (development only)
# dir = "./tls"
# auto_generate = true

# Auto-generation settings (when auto_generate = true)
[server.tls.auto_gen]
# Certificate common name
common_name = "localhost"
# Organization name
organization = "provisr"
# DNS names for Subject Alternative Names
dns_names = ["localhost", "127.0.0.1", "provisr.local"]
# IP addresses for Subject Alternative Names
ip_addresses = ["127.0.0.1"]
# Certificate validity period in days
valid_days = 365

# Optional Prometheus metrics server configuration
# When enabled, exposes metrics on /metrics endpoint
[metrics]
# Enable the metrics server (set to true to serve Prometheus metrics)
enabled = false
# Listen address for metrics server, e.g. ":9090" or "127.0.0.1:9090"
listen = ":9090"

# Process monitoring configuration
[metrics.process_metrics]
# Enable CPU and memory monitoring for managed processes
enabled = false
# Collection interval for process metrics
interval = "5s"
# Maximum number of historical metrics to keep per process
max_history = 100

# Authentication configuration for the HTTP API server (mounts /auth/login,
# /auth/users, /auth/clients when enabled). Users/clients are managed via
# `provisr auth user create` etc, not auto-provisioned from this file.
[server.auth]
# Enable authentication for the API server
enabled = true
# Secret key for signing JWT tokens. Leave unset to generate a random secret
# on each startup (fine for a single long-running server; tokens won't
# survive a restart). Set explicitly if you need tokens to remain valid
# across restarts, or when running multiple server instances.
# jwt_secret = "change-this-in-production"
# Token expiration time (default: 24h)
# token_ttl = "24h"

[server.auth.store]
# Database type: "sqlite" or "postgresql"
type = "sqlite"
migrate = true
# SQLite database path
path = "auth.db"
# PostgreSQL connection fields (only used when type = "postgresql")
# host = "localhost"
# port = 5432
# database = "provisr_auth"
# username = "provisr"
# password = "change-me"
# ssl_mode = "disable"

# There is no [auth.jwt]/[auth.admin] section — credentials are never
# read from config. When [server.auth] is enabled above and the store has
# no users yet, create the first admin through POST /api/auth/bootstrap.
# The bootstrap endpoint is disabled after the first user is created.
# To create additional users, use:
#   provisr auth user create --username <name> --password <password> \
#     --roles admin --config config/config.toml
# --roles is required. Valid roles are admin, operator, and viewer; there is
# no implicit default role.
