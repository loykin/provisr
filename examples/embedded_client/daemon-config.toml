# Example daemon configuration for embedded client testing
env = ["DAEMON_MODE=embedded_example"]

# Required: default directory to write process PID files
pid_dir = "./run"

[log]
dir = "./logs"
max_size_mb = 10
max_backups = 3
max_age_days = 7
compress = false

[daemon]
pid_file = "./provisr-daemon.pid"

[server]
listen = "127.0.0.1:8080"
base_path = "/api"

[metrics]
enabled = false

[history]
enabled = false

# Optional: Pre-defined processes that start with the daemon
[[processes]]
type = "process"
[processes.spec]
name = "example-service"
command = "echo 'Hello from pre-configured process!'"
instances = 1
auto_restart = false
