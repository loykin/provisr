name: Integration Tests

on:
  push:
    branches: [ main, auth ]
  pull_request:
    branches: [ main ]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Run all tests (unit + integration)
      run: make ci

    - name: Upload test artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: test-artifacts
        path: |
          provisr-logs/
          *.log
          auth.db
          scripts/

  history-store-integration:
    name: History sinks (testcontainers)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: OpenSearch sink (dbstore Pool[*opensearchapi.Client])
      run: go test -v -tags integration -timeout=300s ./internal/history/opensearch/...

    - name: PostgreSQL sink (dbstore Pool[*sqlx.DB])
      run: go test -v -tags integration -timeout=300s ./internal/history/postgres/...

    - name: ClickHouse sink (dbstore Pool[*sqlx.DB])
      working-directory: history/clickhouse
      run: go test -v -tags integration -timeout=300s ./...

    - name: Auth store on PostgreSQL (dbstore Pool[*sqlx.DB])
      run: go test -v -tags integration -timeout=300s ./internal/store/...
